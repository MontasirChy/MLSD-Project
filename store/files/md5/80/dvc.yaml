stages :
  preprocess:
    cmd: python preprocess.py ./data/main.csv ./data/prepared
    deps:
      - preprocess.py
      - data/main.csv
    outs:
      - data/processed/train.csv
      - data/processed/test.csv 
  


  train:
    cmd: python train.py ./data/processed/train.csv ./models/model.pkl
    deps:
      - train.py
      - data/processed/train.csv
    outs:
      - models/model.pkl

  eval :
    cmd: python .src/eval.py ./data/processed/test.csv ./models/model.pkl ./metrics/metrics.json
    deps:
      - eval.py
      - data/processed/test.csv
      - models/model.pkl
    metrics:
      - metrics/metrics.json
      